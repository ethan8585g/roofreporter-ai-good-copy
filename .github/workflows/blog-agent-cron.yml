name: Blog Agent Cron

# Fires every 8h — 3 posts/day max, quality gate decides what actually ships.
# Adjust the cron expression to change cadence. Times are UTC.
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to attempt this run (1-3)'
        required: false
        default: '1'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog agent
        env:
          CRON_SECRET: ${{ secrets.BLOG_AGENT_CRON_SECRET }}
          COUNT: ${{ github.event.inputs.count || '1' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::BLOG_AGENT_CRON_SECRET not set in repo secrets"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://www.roofmanager.ca/api/blog/cron/run?n=$COUNT" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then exit 1; fi
